worker_processes 1;
error_log logs/error.log info;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    lua_package_path "./lua/?.lua;./lua/?/init.lua;;";

    lua_max_pending_timers 100;
    lua_max_running_timers 100;

    init_by_lua_block {
        package.loaded["data_dir"] = os.getenv("DATA_DIR") or "D:/Project/URL-TRACKER/data"
    }

    lua_shared_dict url_cache   10m;
    lua_shared_dict stats_cache 10m;
    lua_shared_dict rate_limit  10m;
    lua_shared_dict geo_cache   20m;
    lua_shared_dict mutex       1m;

    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        text/plain                            txt;
        text/javascript                       js mjs;
        application/json                      json;
        application/rss+xml                   rss;
        application/atom+xml                  atom;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/webp                            webp;
        image/svg+xml                         svg svgz;
        image/x-icon                          ico;
        font/woff                             woff;
        font/woff2                            woff2;
        application/vnd.ms-fontobject         eot;
        font/ttf                              ttf;
        font/otf                              otf;
        application/octet-stream              bin exe dll;
        application/zip                       zip;
        video/mp4                             mp4;
        audio/mpeg                            mp3;
    }
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json text/javascript
        text/xml image/svg+xml text/event-stream;

    access_log logs/access.log;

    server {
        listen 8080;
        server_name _;

        # ── API ───────────────────────────────────────────

        location = /api/shorten {
            default_type application/json;
            content_by_lua_file lua/api/shorten.lua;
        }

        location ~ "^/api/stats/(?<code>[a-zA-Z0-9_-]+)$" {
            default_type application/json;
            content_by_lua_file lua/api/stats.lua;
        }

        location = /api/stream {
            default_type text/event-stream;
            content_by_lua_file lua/api/stream.lua;
        }

        location ~ "^/api/export/(?<code>[a-zA-Z0-9_-]+)$" {
            default_type text/csv;
            content_by_lua_file lua/api/export.lua;
        }

        location = /api/links {
            default_type application/json;
            content_by_lua_file lua/api/links.lua;
        }

        # ── Frontend (Astro static build) ─────────────────

        location ~ ^/dashboard/.+ {
            root ./astro-app/dist;
            rewrite ^ /dashboard/index.html break;
        }

        location ~ ^/preview/.+ {
            root ./astro-app/dist;
            rewrite ^ /preview/index.html break;
        }

        location /_astro/ {
            root ./astro-app/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Redirect: /:code ──────────────────────────────

        location ~ "^/(?<code>[a-zA-Z0-9_-]{3,20})$" {
            content_by_lua_file lua/redirect.lua;
        }

        # ── Fallback → static files ──────────────────────

        location / {
            root ./astro-app/dist;
            index index.html;
            try_files $uri $uri/ $uri/index.html /index.html;
        }
    }
}